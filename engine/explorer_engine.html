<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Triage — explore the recipe</title>
<style>
  :root{
    --bg:#14171c; --grid:#1b1f26; --node:#2a2f38; --line:#3a414d;
    --ink:#e9ecf1; --mut:#9aa3b1; --dim:#727a88;
    --blue:#5b8fd6; --brass:#c9a860; --green:#57b083; --steel:#7b9bc4; --amber:#d8944a;
  }
  html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;overflow:hidden}
  .hdr{position:fixed;top:15px;left:22px;z-index:9;max-width:56ch}
  .hdr .back{display:inline-block;font-size:12.5px;color:var(--mut);text-decoration:none;margin-bottom:8px}
  .hdr .back:hover{color:var(--ink)}
  .hdr .ht{font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
  .hdr .hs{font-size:12px;color:var(--mut);margin-top:4px;line-height:1.45}
  .hdr .hs em{color:var(--steel);font-style:normal}
  .legend{position:fixed;top:18px;right:24px;display:flex;gap:18px;font-size:11.5px;color:var(--mut);z-index:9;align-items:center}
  .legend .it{display:flex;gap:7px;align-items:center}
  .legend .sw{width:13px;height:13px;border-radius:3px;border:1px solid}
  .legend .sw.shared{background:#2c3a49;border-color:var(--steel)}
  .legend .sw.domain{background:#43391f;border-color:var(--brass)}
  .legend .sw.gate{background:#432e18;border-color:var(--amber);border-style:dashed}
  .legend b{color:var(--ink);font-weight:500}
  .wlegend{position:fixed;bottom:16px;left:22px;display:flex;gap:16px;font-size:11px;color:var(--mut);z-index:9;align-items:center}
  .wlegend .wi{display:flex;gap:7px;align-items:center}
  .wlegend .ln{width:22px;height:0;border-top:2.5px solid}
  #canvas{position:absolute;inset:0;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:26px 26px}
  #world{position:absolute;inset:0;transform-origin:0 0;will-change:transform}
  #wires{position:absolute;inset:0;overflow:visible}
  #wires path{fill:none}
  #wires .w{pointer-events:none}
  #wires .hit{pointer-events:stroke;stroke:transparent;stroke-width:18}
  .node{position:absolute;background:var(--node);border:1px solid var(--line);border-radius:7px;
    box-shadow:0 6px 16px rgba(0,0,0,.35);overflow:hidden;cursor:pointer;transition:opacity .15s}
  .nhead{padding:5px 10px;font-size:12.5px;font-weight:600;color:#fff;background:#333a45;
    border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;border-left:3px solid transparent}
  .nhead .kd{font-size:8.5px;font-weight:500;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em}
  .node.in .nhead{background:#26384f;border-left-color:var(--blue)}
  .node.shared .nhead{background:#2c3a49;border-left-color:var(--steel)}
  .node.domain .nhead{background:#43391f;border-left-color:var(--brass)}
  .node.gate   .nhead{background:#432e18;border-left-color:var(--amber)}
  .node.out    .nhead{background:#213f30;border-left-color:var(--green)}
  .node.domain{border-color:#5a4c2b} .node.gate{border-color:var(--amber);border-style:dashed}
  .nsub{padding:5px 11px;height:23px;font-size:10.5px;color:var(--steel);border-bottom:1px solid var(--line);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-sizing:border-box}
  .row{position:relative;height:23px;display:flex;align-items:center;font-size:11.5px;color:var(--mut)}
  .row.out{justify-content:flex-end;padding-right:11px;color:var(--ink)}
  .row.inp{justify-content:flex-start;padding-left:11px}
  .row.gate{padding-left:11px;color:var(--amber)}
  .dot{position:absolute;width:9px;height:9px;border-radius:50%;top:50%;transform:translateY(-50%);border:1.5px solid var(--bg)}
  .row.out .dot{right:-5px;background:#8b93a1}
  .row.inp .dot{left:-5px;background:var(--dim)}
  .row.gate .dot{left:-5px;background:var(--amber)}
  .node.in .row.out .dot{background:var(--blue)}
  .node.shared .row.out .dot{background:var(--steel)}
  .node.domain .row.out .dot{background:var(--brass)}
  .node.gate .row.out .dot{background:var(--amber)}
  .node.out .row.inp .dot{background:var(--green)}
  .detail{opacity:0;transition:opacity .35s;border-top:1px solid var(--line);margin-top:5px;padding:8px 12px 10px;font-size:12px;color:var(--mut)}
  .node.exp .detail{opacity:1}
  .detail .dtitle{font-size:12px;color:var(--ink);font-weight:600;margin:-1px 0 9px;padding-bottom:8px;border-bottom:1px solid var(--line)}
  .detail .dr{display:flex;gap:8px;margin:4px 0;line-height:1.4}
  .detail .dk{color:var(--dim);flex:none;width:74px;text-transform:uppercase;font-size:9px;letter-spacing:.05em;padding-top:1px}
  .detail .dv{color:var(--ink);flex:1}
  .detail .dv .q{color:var(--steel)}
  .detail .rmore{color:var(--brass);cursor:pointer;white-space:nowrap;text-decoration:underline;text-underline-offset:2px}
  .detail .rmore:hover{color:#e0c078}
  .detail .rfull{display:none;margin-top:6px;padding:8px 10px;background:#14171c;border:1px solid var(--line);border-radius:5px;
    color:var(--mut);line-height:1.5;white-space:pre-wrap}
  .detail .rfull.on{display:block}
  .detail .pass{margin:6px 0 0;padding-left:2px}
  .detail .pass .pn{display:inline-block;min-width:44px;color:var(--amber);font-size:9px;text-transform:uppercase;letter-spacing:.05em}
</style></head><body>
<div class="hdr">
  <a class="back" href="../../">← workflow engine</a>
  <div class="ht">__TITLE__</div>
  <div class="hs">__DESC__</div>
</div>
<div class="legend">
  <span class="it"><span class="sw shared"></span><b>reused</b>&nbsp;from the shared library</span>
  <span class="it"><span class="sw domain"></span><b>custom</b>&nbsp;for this job</span>
  <span class="it"><span class="sw gate"></span><b>human gate</b></span>
</div>
<div class="wlegend" id="wlegend"></div>
<div id="canvas"><div id="world"><svg id="wires"></svg></div></div>
<script>
__GRAPH_CORE__
</script>
<script>
"use strict";
const NODES=__NODES__;
const WIRES=__WIRES__;
const WEXP=360, DUR=520;
const detailPx={};   // measured per node after render → exact expanded height, no clipping
// the layout + orthogonal router live in the shared core (engine/graph_core.js); this file is only render + interaction
const G=makeGraphCore(NODES,WIRES,{WEXP,detailPx,axisY:()=>innerHeight/2});
const {sock,wtype,wtopo,WCOL,colOf,computeGeom,route,roundedPath,junctions,juncPoint}=G;
{ const L={split:"split — fans out",merge:"merge — fans in",loop:"loop",gate:"gate"};   // legend: only the types present in this graph
  document.getElementById("wlegend").innerHTML=["split","merge","loop","gate"].filter(t=>wtopo.includes(t))
    .map(t=>{const c=WCOL[t];return `<span class="wi"><span class="ln" style="border-color:${c[0]}${c[2]?';border-top-style:dashed':''}"></span>${L[t]}</span>`;}).join(""); }

const canvas=document.getElementById("canvas"), world=document.getElementById("world"), svg=document.getElementById("wires"), NS="http://www.w3.org/2000/svg";
const el={}, wpath=[];

// build node DOM once
NODES.forEach(n=>{
  const d=document.createElement("div"); d.className="node "+n.kind; d.dataset.id=n.id;
  const kd=(n.kind==="in"||n.kind==="out")?"":`<span class="kd">${n.kind}</span>`;
  let h=`<div class="nhead">${n.title||n.id}${kd}</div>`;
  if(n.sub) h+=`<div class="nsub">${n.sub}</div>`;
  n.outs.forEach(o=>h+=`<div class="row out">${o}<span class="dot" data-s="${n.id}.${o}.out"></span></div>`);
  n.ins.forEach(i=>{ const g=/^when /.test(i); h+=`<div class="row ${g?'gate':'inp'}"><span class="dot" data-s="${n.id}.${i}.in"></span>${g?'▸ '+i:i}</div>`; });
  const DT={in:"What flows in",out:"What comes out",shared:"What this specialist does",domain:"What this specialist does",gate:"What this specialist does"};
  const dtitle=DT[n.kind]?`<div class="dtitle">${DT[n.kind]}</div>`:"";
  h+=`<div class="detail">`+dtitle+(n.detail||[]).map(([k,v])=>`<div class="dr"><span class="dk">${k}</span><span class="dv">${v}</span></div>`).join("")+`</div>`;
  d.innerHTML=h; d.addEventListener("click",ev=>{ ev.stopPropagation();
    const more=ev.target.closest(".rmore"); if(more){ toggleFull(more,n.id); return; } toggle(n.id); });
  d.addEventListener("mouseenter",()=>{ hoverId=n.id; if(!expId&&!animating){ exitWireMode(); refreshFocus(); } }); d.addEventListener("mouseleave",()=>{ hoverId=null; if(!expId&&!animating&&!wireMode) refreshFocus(); });
  world.appendChild(d); el[n.id]=d;
});
canvas.addEventListener("click",()=>{ if(expId){ const p=expId; expId=null; relayout(true,p);} });
const hit=[];
WIRES.forEach((w,i)=>{
  const hp=document.createElementNS(NS,"path"); hp.setAttribute("class","hit"); svg.appendChild(hp); hit.push(hp);
  const p=document.createElementNS(NS,"path"); p.setAttribute("class","w"); p.dataset.src=w[0]; p.dataset.dst=w[2]; p.dataset.gate=(w[4]==="gate"||w[4]==="loop")?"1":""; svg.appendChild(p); wpath.push(p);
  hp.addEventListener("mouseenter",()=>{ if(!expId&&!animating) onWire(i); });
  hp.addEventListener("mouseleave",()=>{ if(!expId&&!animating) offWire(); });
});
const CONN={}; NODES.forEach(n=>CONN[n.id]=new Set()); WIRES.forEach(w=>{ CONN[w[0]].add(w[2]); CONN[w[2]].add(w[0]); });
// fork/join junctions come from the core (split source / merge dest) — here we only build their DOM
const junc=junctions.map(j=>Object.assign({},j));
junc.forEach(j=>{ j.hit=document.createElementNS(NS,"path"); j.hit.setAttribute("class","hit"); svg.appendChild(j.hit);   // hover target over the trunk
  j.p=document.createElementNS(NS,"path"); j.p.setAttribute("class","w"); j.p.setAttribute("stroke",j.col); j.p.setAttribute("stroke-width","2.4"); j.p.setAttribute("fill","none"); j.p.setAttribute("opacity",".7"); svg.appendChild(j.p);
  j.c=document.createElementNS(NS,"circle"); j.c.setAttribute("r","3.4"); j.c.setAttribute("fill",j.col); j.c.setAttribute("pointer-events","none"); svg.appendChild(j.c);
  j.hit.addEventListener("mouseenter",()=>{ if(!expId&&!animating) onFocus(()=>highlightJunc(j)); });
  j.hit.addEventListener("mouseleave",()=>{ if(!expId&&!animating) offWire(); }); });
function drawJunctions(gm){ junc.forEach(j=>{ const p=juncPoint(j,gm);
  const d=`M ${p.x} ${p.y} L ${p.jx} ${p.y}`; j.p.setAttribute("d",d); j.hit.setAttribute("d",d); j.c.setAttribute("cx",p.jx); j.c.setAttribute("cy",p.y); }); }
function litWires(pred, litNodes){
  wpath.forEach((p,i)=>{ const on=pred(i);
    if(!p.dataset.gate) p.setAttribute("stroke", on?"#e3e9f2":"#b7c0cf");
    p.setAttribute("opacity", on?(p.dataset.gate?"1":".95"):".06"); p.setAttribute("stroke-width", on?"2.7":"2.2"); });
  NODES.forEach(n=> el[n.id].style.opacity=litNodes.has(n.id)?"1":".38");
}
function highlight(id){ const s=new Set([id,...CONN[id]]); litWires(i=>wpath[i].dataset.src===id||wpath[i].dataset.dst===id, s); }
function highlightWire(idx){ const w=WIRES[idx]; litWires(i=>i===idx, new Set([w[0],w[2]])); }
function highlightJunc(j){   // a split/merge trunk → light the whole fan (all wires sharing that socket) + their nodes
  const idx=new Set(), nodes=new Set([j.node]);
  WIRES.forEach((w,i)=>{ if(j.io==="out"?(w[0]===j.node&&w[1]===j.sock):(w[2]===j.node&&w[3]===j.sock)){ idx.add(i); nodes.add(j.io==="out"?w[2]:w[0]); } });
  litWires(i=>idx.has(i), nodes); }
function clearHi(){ WIRES.forEach((_,i)=>styleWire(i)); NODES.forEach(n=> el[n.id].style.opacity="1"); }
// wire-hover mode: dwell to enter, then instant on any wire; lingers the SAME dwell after leaving all wires
const DWELL=360;
let wireMode=false, wireDwellT=0, wireClearT=0;
function onFocus(fn){ clearTimeout(wireClearT); clearTimeout(wireDwellT);   // shared dwell for wires AND junction trunks
  if(wireMode) fn(); else wireDwellT=setTimeout(()=>{ wireMode=true; fn(); }, DWELL); }
function onWire(i){ onFocus(()=>highlightWire(i)); }
function offWire(){ clearTimeout(wireDwellT);
  if(wireMode) wireClearT=setTimeout(()=>{ wireMode=false; refreshFocus(); }, DWELL); }
function exitWireMode(){ wireMode=false; clearTimeout(wireDwellT); clearTimeout(wireClearT); }
// measure each card's detail block at expanded width → exact height, no clipping of the richer content
NODES.forEach(n=>{ const d=el[n.id]; d.style.width=WEXP+"px"; detailPx[n.id]=d.querySelector(".detail").offsetHeight+8; d.style.width=""; });
function toggleFull(btn,id){                                     // reveal/hide a long output inline; the card grows & reflows
  const full=btn.parentElement.querySelector(".rfull"); if(!full) return;
  btn.textContent=full.classList.toggle("on")?"hide ▲":"show full ▸";
  detailPx[id]=el[id].querySelector(".detail").offsetHeight+8;   // re-measure with the full text shown/hidden
  relayout(true);                                                // grow/shrink the card, reflow the graph
}
G.computeRouting();   // now that expanded heights are known, pick routes clear across every state
const dotOf={}; canvas.querySelectorAll(".dot").forEach(d=>dotOf[d.dataset.s]=d);

function styleWire(i){ const p=wpath[i], [c,op,dash]=WCOL[wtopo[i]]||WCOL.data;
  p.setAttribute("stroke",c); p.setAttribute("stroke-width","2.2"); p.setAttribute("opacity",op);
  if(dash) p.setAttribute("stroke-dasharray","6 4"); else p.removeAttribute("stroke-dasharray"); }
function fit(g){                                 // center the whole graph in the viewport; scale down only if it can't fit
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  NODES.forEach(n=>{ const b=g[n.id]; if(b.x<minx)minx=b.x; if(b.y<miny)miny=b.y; if(b.x+b.w>maxx)maxx=b.x+b.w; if(b.y+b.h>maxy)maxy=b.y+b.h; });
  const LM=66; miny-=LM; maxy+=LM;               // room for the highway loops above/below
  const gw=maxx-minx, gh=maxy-miny, vw=innerWidth, vh=innerHeight, padX=90, padTop=64, padBot=44;
  const s=Math.min(1,(vw-2*padX)/gw,(vh-padTop-padBot)/gh);
  const tx=(vw-gw*s)/2-minx*s, ty=padTop+((vh-padTop-padBot)-gh*s)/2-miny*s;
  world.style.transform=`translate(${tx}px,${ty}px) scale(${s})`;
}
function drawAll(g){ WIRES.forEach((_,i)=>{ const d=roundedPath(route(i,g)); wpath[i].setAttribute("d",d); hit[i].setAttribute("d",d); }); drawJunctions(g); fit(g); }
function applyGeom(g){ NODES.forEach(n=>{ const d=el[n.id],t=g[n.id]; d.style.left=t.x+"px";d.style.top=t.y+"px";d.style.width=t.w+"px";d.style.height=t.h+"px"; }); }
function ease(t){ return t<.5? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
function lerpGeom(a,b,e){ const g={}; NODES.forEach(n=>{ const p=a[n.id]||b[n.id], q=b[n.id];
  g[n.id]={x:p.x+(q.x-p.x)*e,y:p.y+(q.y-p.y)*e,w:p.w+(q.w-p.w)*e,h:p.h+(q.h-p.h)*e}; }); return g; }

let expId=null, hoverId=null, animating=false, anim=0, curGeom=null;
function refreshFocus(){ const f=expId||hoverId; if(f) highlight(f); else clearHi(); }
function relayout(animate, prevExp){
  const endGeom=computeGeom(expId);
  NODES.forEach(n=> el[n.id].classList.toggle("exp",n.id===expId));
  WIRES.forEach((_,i)=>styleWire(i));
  const hold=expId||prevExp; if(hold) highlight(hold); else refreshFocus();   // keep it lit through the whole animation
  if(!animate || !curGeom){ applyGeom(endGeom); drawAll(endGeom); curGeom=endGeom; if(!expId) refreshFocus(); return; }
  const startGeom=curGeom; cancelAnimationFrame(anim); animating=true; const t0=performance.now();
  const step=now=>{ let t=(now-t0)/DUR; if(t>1)t=1; const g=lerpGeom(startGeom,endGeom,ease(t));
    applyGeom(g); drawAll(g);
    if(t<1) anim=requestAnimationFrame(step); else { curGeom=endGeom; animating=false; if(!expId) refreshFocus(); } };  // held for the FULL animation; only now re-evaluate hover → clears iff done AND not hovering
  anim=requestAnimationFrame(step);
}
function toggle(id){ const prev=expId; expId=(expId===id?null:id); relayout(true, prev); }
addEventListener("resize",()=>{ if(!anim){ curGeom=computeGeom(expId); applyGeom(curGeom); drawAll(curGeom); } });

relayout(false);
{ const p=new URLSearchParams(location.search); const q=p.get("exp"); if(q){ expId=q; relayout(true); } const h=p.get("hl"); if(h) highlight(h); }
</script>
<style id=embedcss>body.embed .back{display:none!important}body.embed .hdr{padding-top:6px}</style><script>if(/[?&]embed/.test(location.search))document.body.classList.add("embed");</script>
</body></html>
