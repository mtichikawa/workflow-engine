<style>

  <div class="ht">Refine · code review</div>
  <div class="hs">A different topic through the loop — <em>why code review culture matters</em>: draft, self-grade, rewrite until it clears the bar.</div>
</div>
<div class="legend">
  <span class="it"><span class="sw shared"></span><b>reused</b>&nbsp;from the shared library</span>

</div>

<div id="canvas"><div id="world"><svg id="wires"></svg></div></div>
<script>
// graph_core.js — shared layout + orthogonal routing for the recipe graph.
//
// Used by BOTH the full explorer (engine/explorer_engine.html) and the gallery mini
// (tools/build_gallery.py), inlined into each at build time so both stay self-contained.
// Pure geometry + routing: no DOM, no window references (the viewport axis comes in via cfg).
//
//   const G = makeGraphCore(NODES, WIRES, {axisY:()=>innerHeight/2, detailPx});
//   G.computeRouting();                       // decide routes (needs card heights measured first)
//   const geom = G.computeGeom(expandedId);   // laid-out boxes {x,y,w,h} per node id
//   const d    = G.roundedPath(G.route(i, geom));   // an SVG path for wire i in that geometry
//
// NODES: [{id, kind, col, outs:[sock…], ins:[sock…], sub?, w0?}]
// WIRES: [[srcId, srcSock, dstId, dstSock, type?]]   type: "gate" | "loop" | (absent = data)
function makeGraphCore(NODES, WIRES, cfg){
  cfg = Object.assign({
    W:160, WEXP:360, HEAD:27, SUBH:23, ROW:23, PAD:7, R:9,
    MX:60, COLGAP:124, HGAP:22, LANE:10, VGAP:34, FORK:22, CLEAR:16,
    detailPx:{}, axisY:function(){ return 300; }
  }, cfg||{});
  const {W,WEXP,HEAD,SUBH,ROW,PAD,R,MX,COLGAP,HGAP,LANE,VGAP,FORK,CLEAR}=cfg;
  const detailPx=cfg.detailPx;

  const headH=n=>HEAD+(n.sub?SUBH:0);   // header (+ optional always-visible subtitle) before the sockets
  const wBase=n=>n.w0||W;
  const rowsOf=n=>n.outs.length+n.ins.length;   // gate sockets are regular ins (named "when …")
  const socketH=n=>headH(n)+rowsOf(n)*ROW+PAD;
  const heightOf=(n,exp)=> socketH(n) + (exp?(detailPx[n.id]||0):0);
  function socketsOf(n){ const l=[]; let r=0; const y0=headH(n);
    n.outs.forEach(o=>{l.push({name:o,io:"out",side:"EAST",y:y0+(r+.5)*ROW});r++;});
    n.ins.forEach(i=>{l.push({name:i,io:"in",side:"WEST",y:y0+(r+.5)*ROW});r++;});
    return l; }

  const wtype=WIRES.map(w=>w[4]||"data");   // control type: "data" | "gate" | "loop"
  // topology of the plain data wires: a source socket feeding >1 dest = split (fan-out); a dest socket fed by >1 = merge (fan-in)
  const _sN={}, _dN={};
  WIRES.forEach(w=>{ if((w[4]||"data")!=="data") return; const s=w[0]+"."+w[1], d=w[2]+"."+w[3]; _sN[s]=(_sN[s]||0)+1; _dN[d]=(_dN[d]||0)+1; });
  const wtopo=WIRES.map(w=>{ const t=w[4]||"data"; if(t!=="data") return t;
    if(_dN[w[2]+"."+w[3]]>1) return "merge"; if(_sN[w[0]+"."+w[1]]>1) return "split"; return "data"; });
  const WCOL={gate:["#c9a860",".82",1], loop:["#cf7a68",".85",1], merge:["#a986d6",".62",0], split:["#54b4a2",".58",0], data:["#b7c0cf",".3",0]};

  const colOf=Object.fromEntries(NODES.map(n=>[n.id,n.col]));
  const socketRel={}; NODES.forEach(n=>{ socketRel[n.id]={}; socketsOf(n).forEach(s=>socketRel[n.id][s.name+"."+s.io]=s.y); });
  const cols={}; NODES.forEach(n=>(cols[n.col]=cols[n.col]||[]).push(n));
  const colIdx=Object.keys(cols).map(Number).sort((a,b)=>a-b);

  // self-layout: each column centered on one axis (single cards sit dead-center, grow symmetrically)
  function computeGeom(expId){
    const wOf=n=> expId===n.id?WEXP:wBase(n), hOf=n=> heightOf(n,expId===n.id);
    const colW={}; colIdx.forEach(c=> colW[c]=Math.max(...cols[c].map(wOf)));
    const colX={}; let x=MX; colIdx.forEach(c=>{ colX[c]=x; x+=colW[c]+COLGAP; });
    const axisY=cfg.axisY(), g={};
    colIdx.forEach(c=>{ const list=cols[c];
      const total=list.reduce((s,n)=>s+hOf(n),0)+VGAP*(list.length-1);
      let y=axisY-total/2;
      list.forEach(n=>{ g[n.id]={x:colX[c],y,w:wOf(n),h:hOf(n)}; y+=hOf(n)+VGAP; }); });
    return g;
  }
  function sock(id,name,io,g){ const b=g[id]; return {x: io==="out"? b.x+b.w : b.x, y: b.y+socketRel[id][name+"."+io]}; }
  function colRight(c,g){ let m=-1e9; NODES.forEach(n=>{if(n.col===c)m=Math.max(m,g[n.id].x+g[n.id].w);}); return m; }
  function colLeft(c,g){ let m=1e9; NODES.forEach(n=>{if(n.col===c)m=Math.min(m,g[n.id].x);}); return m; }
  function channelX(k,g){ return (colRight(k,g)+colLeft(k+1,g))/2; }
  function clearH(y,x1,x2,cs,ct,g){ const lo=Math.min(x1,x2),hi=Math.max(x1,x2);
    for(const n of NODES){ if(n.col<=cs||n.col>=ct) continue; const b=g[n.id];
      if(y>b.y-CLEAR&&y<b.y+b.h+CLEAR&&b.x<hi&&b.x+b.w>lo) return false; } return true; }
  function band(cs,ct,g){ let top=1e9,bot=-1e9; NODES.forEach(n=>{ if(n.col<=cs||n.col>=ct)return; const b=g[n.id]; top=Math.min(top,b.y); bot=Math.max(bot,b.y+b.h); }); return {top,bot}; }

  // routing decided ONCE, but each wire's path is chosen clear across EVERY reachable state (collapsed +
  // each single-card expansion). So decisions never change between states → no snap, no fold — never grazes
  // a card. Must run after card heights are measured (needs the expanded geometries).
  let DEC=[], OFF={};
  function computeRouting(){
    const states=[computeGeom(null)].concat(NODES.map(n=>computeGeom(n.id)));
    const base=states[0];
    const clearAllStates=(w,which)=> states.every(g=>{ const a=sock(w[0],w[1],"out",g),b=sock(w[2],w[3],"in",g),cs=colOf[w[0]],ct=colOf[w[2]];
      return clearH(which==="a"?a.y:b.y,a.x,b.x,cs,ct,g); });
    DEC=WIRES.map(w=>{ const cs=colOf[w[0]],ct=colOf[w[2]];
      if(ct-cs<=1) return {t:"vnt"};
      if(clearAllStates(w,"a")) return {t:"vnt"};
      if(clearAllStates(w,"b")) return {t:"vns"};
      const a=sock(w[0],w[1],"out",base),b=sock(w[2],w[3],"in",base),bd=band(cs,ct,base);
      return {t:"hwy",side:(Math.min(a.y,b.y)-bd.top)<=(bd.bot-Math.max(a.y,b.y))?"above":"below"}; });
    OFF={}; WIRES.forEach((_,i)=>OFF[i]={a:0,b:0,hy:0});
    const vsegs=[];
    WIRES.forEach((w,i)=>{ const cs=colOf[w[0]],ct=colOf[w[2]],d=DEC[i], a=sock(w[0],w[1],"out",base),b=sock(w[2],w[3],"in",base),mid=(a.y+b.y)/2;
      if(d.t==="vnt") vsegs.push({i,ch:ct-1,mid,slot:"a"});
      else if(d.t==="vns") vsegs.push({i,ch:cs,mid,slot:"a"});
      else { vsegs.push({i,ch:cs,mid,slot:"a"}); vsegs.push({i,ch:ct-1,mid,slot:"b"}); } });
    const byCh={}; vsegs.forEach(s=>(byCh[s.ch]=byCh[s.ch]||[]).push(s));
    Object.values(byCh).forEach(list=>{ list.sort((p,q)=>p.mid-q.mid); const n=list.length; list.forEach((s,k)=> OFF[s.i][s.slot]=(k-(n-1)/2)*LANE); });
    ["above","below"].forEach(side=>{ const list=WIRES.map((w,i)=>({i,d:DEC[i]})).filter(x=>x.d.t==="hwy"&&x.d.side===side);
      list.sort((p,q)=> sock(WIRES[p.i][0],WIRES[p.i][1],"out",base).y - sock(WIRES[q.i][0],WIRES[q.i][1],"out",base).y);
      list.forEach((x,k)=> OFF[x.i].hy=k*LANE); });
  }
  let _li=0; const LOOPOFF=WIRES.map(w=>w[4]==="loop"?(_li++)*15:0);   // stack multiple loops
  function route(i,g){ const w=WIRES[i], dec=DEC[i], o=OFF[i],
    a=sock(w[0],w[1],"out",g), b=sock(w[2],w[3],"in",g), cs=colOf[w[0]], ct=colOf[w[2]];
    if(wtype[i]==="loop"){                                             // feedback: route up and over EVERYTHING, back into the target
      const stub=22+LOOPOFF[i], top=Math.min(...NODES.map(n=>g[n.id].y))-44-LOOPOFF[i];
      return [a,{x:a.x+stub,y:a.y},{x:a.x+stub,y:top},{x:b.x-stub,y:top},{x:b.x-stub,y:b.y},b]; }
    // split source / merge dest: start/end at a fork/join junction so the branch is visible
    const aa=(_sN[w[0]+"."+w[1]]>1)?{x:a.x+FORK,y:a.y}:a, bb=(_dN[w[2]+"."+w[3]]>1)?{x:b.x-FORK,y:b.y}:b;
    // straight shot only when nothing forces a detour — a highway means the direct line is blocked
    if(Math.abs(aa.y-bb.y)<0.5 && dec.t!=="hwy") return [aa,bb];
    if(dec.t==="vnt"){ const lx=channelX(ct-1,g)+o.a; return [aa,{x:lx,y:aa.y},{x:lx,y:bb.y},bb]; }
    if(dec.t==="vns"){ const lx=channelX(cs,g)+o.a; return [aa,{x:lx,y:aa.y},{x:lx,y:bb.y},bb]; }
    const l1=channelX(cs,g)+o.a, l2=channelX(ct-1,g)+o.b, bd=band(cs,ct,g),
      hY=dec.side==="above"?bd.top-HGAP-o.hy:bd.bot+HGAP+o.hy;
    return [aa,{x:l1,y:aa.y},{x:l1,y:hY},{x:l2,y:hY},{x:l2,y:bb.y},bb]; }

  function roundedPath(pts){
    const q=[pts[0]]; for(let i=1;i<pts.length;i++){const a=q[q.length-1],b=pts[i]; if(Math.abs(a.x-b.x)>.5||Math.abs(a.y-b.y)>.5)q.push(b);}
    if(q.length<2) return `M ${pts[0].x} ${pts[0].y}`;
    let d=`M ${q[0].x} ${q[0].y}`;
    for(let i=1;i<q.length-1;i++){const p0=q[i-1],p1=q[i],p2=q[i+1];
      const d1x=Math.sign(p1.x-p0.x),d1y=Math.sign(p1.y-p0.y),d2x=Math.sign(p2.x-p1.x),d2y=Math.sign(p2.y-p1.y);
      const r=Math.min(R,Math.hypot(p1.x-p0.x,p1.y-p0.y)/2,Math.hypot(p2.x-p1.x,p2.y-p1.y)/2);
      d+=` L ${p1.x-d1x*r} ${p1.y-d1y*r} Q ${p1.x} ${p1.y} ${p1.x+d2x*r} ${p1.y+d2y*r}`;}
    const l=q[q.length-1]; d+=` L ${l.x} ${l.y}`; return d; }

  // fork/join junctions: where a socket fans out (split) or fans in (merge) — a dot + short trunk
  const junctions=[]; { const _js=new Set();
    WIRES.forEach(w=>{ if((w[4]||"data")!=="data") return; const sk=w[0]+"."+w[1], dk=w[2]+"."+w[3];
      if(_sN[sk]>1 && !_js.has("o"+sk)){ _js.add("o"+sk); junctions.push({node:w[0],sock:w[1],io:"out",col:WCOL.split[0]}); }
      if(_dN[dk]>1 && !_js.has("i"+dk)){ _js.add("i"+dk); junctions.push({node:w[2],sock:w[3],io:"in",col:WCOL.merge[0]}); } }); }
  function juncPoint(j,g){ const p=sock(j.node,j.sock,j.io,g); return {x:p.x, y:p.y, jx: j.io==="out"?p.x+FORK:p.x-FORK}; }

  return { NODES, WIRES, FORK, R, HEAD, ROW, WCOL,
    socketsOf, socketRel, heightOf, socketH, sock,
    wtype, wtopo, colOf, computeGeom, channelX, band,
    computeRouting, route, roundedPath, junctions, juncPoint, LOOPOFF,
    _sN, _dN, get DEC(){return DEC;}, get OFF(){return OFF;} };
}
if (typeof module!=="undefined" && module.exports) module.exports={makeGraphCore};

</script>

"use strict";
const NODES=[{"id": "IN", "kind": "in", "col": 0, "outs": ["topic", "sources", "brief", "slug"], "ins": [], "title": "the brief", "w0": 250, "sub": "“why code review culture matters more than tooling”", "detail": [["what", "the raw work item the whole recipe runs on — one incoming brief"], ["carries", "topic · brief · sources · slug"], ["this brief", "<span class=\"q\">“why code review culture matters more than tooling”</span>"]]}, {"id": "write", "kind": "domain", "col": 1, "outs": ["post"], "ins": ["when fail", "topic", "sources", "brief", "feedback"], "gate": false, "detail": [["specialty", "writing a short post"], ["this brief", "<span class=\"q\">4 passes</span> — drafted, checked, and revised until it passed:<div class=\"pass\"><span class=\"pn\">pass 1</span> → a drafted post: <span class=\"q\">“Code review culture beats tooling every time. A linter catches unused imports; it doesn&#x27;t catch the reviewer who rubber-stamps a 400-line PR in 90 sec…”</span> <span class=\"rmore\">show full ▸</span><div class=\"rfull\">Code review culture beats tooling every time. A linter catches unused imports; it doesn&#x27;t catch the reviewer who rubber-stamps a 400-line PR in 90 seconds. The best tooling I&#x27;ve seen made bad reviews faster, not fewer. Small PRs, real questions, and reviewers who actually run the branch move defect rates more than any tool you can install.</div></div><div class=\"pass\"><span class=\"pn\">pass 2</span> → a drafted post: <span class=\"q\">“Code review culture beats tooling because tools flag what changed, not whether it should have. A linter catches an unused import in 50ms; it never ask…”</span> <span class=\"rmore\">show full ▸</span><div class=\"rfull\">Code review culture beats tooling because tools flag what changed, not whether it should have. A linter catches an unused import in 50ms; it never asks why the function exists. Teams that treat review as shared ownership ship fewer regressions than teams that bolt on more checks and skim the diff.</div></div><div class=\"pass\"><span class=\"pn\">pass 3</span> → a drafted post: <span class=\"q\">“Code review culture matters more than tooling because a linter can flag an unused import in 50ms but it can&#x27;t ask why a function exists. I&#x27;ve watched…”</span> <span class=\"rmore\">show full ▸</span><div class=\"rfull\">Code review culture matters more than tooling because a linter can flag an unused import in 50ms but it can&#x27;t ask why a function exists. I&#x27;ve watched teams add three static analysis tools and still ship the same class of bug, while a team with one reviewer who asks &quot;what happens when this input is null&quot; cut escaped defects by 40%. Tools catch the 20% of issues that are mechanical; people catch the 80% that are about intent. Buy the tools, but the review habit is what moves the number.</div></div><div class=\"pass\"><span class=\"pn\">pass 4</span> → a drafted post: <span class=\"q\">“Code review culture beats tooling because a linter can&#x27;t tell you the abstraction is wrong. The best static analysis flags null derefs; it never asks…”</span> <span class=\"rmore\">show full ▸</span><div class=\"rfull\">Code review culture beats tooling because a linter can&#x27;t tell you the abstraction is wrong. The best static analysis flags null derefs; it never asks why this service owns that data. Buy the tools, but if reviewers rubber-stamp under deadline pressure, you&#x27;re paying for the illusion of review.</div></div>"]]}, {"id": "verify", "kind": "shared", "col": 2, "outs": ["issues", "verdict"], "ins": ["draft", "topic"], "gate": false, "detail": [["specialty", "checking whether a set of results holds together"], ["tuned", "here, STRICT — fail unless ALL hold: contains AT LEAST TWO distinct concrete numeric statistics (real numbers, percentages, or units); names a specific, concrete failure mode; uses NO hype words (revolutionary, game-changing, seamless, powerful, robust); no emojis; under 4 sentences. Be demanding — flag every miss in `issues`."], ["this brief", "<span class=\"q\">4 passes</span> — drafted, checked, and revised until it passed:<div class=\"pass\"><span class=\"pn\">pass 1</span> → <span class=\"q\">fail (0.9)</span> — raised 1 concern(s): Contains 4 sentences; standard requires under 4 (i.e., at most 3)</div><div class=\"pass\"><span class=\"pn\">pass 2</span> → <span class=\"q\">fail (0.9)</span> — raised 1 concern(s): Only one concrete numeric statistic present (&quot;50ms&quot;); standard requires at least two distinct numeric statistics</div><div class=\"pass\"><span class=\"pn\">pass 3</span> → <span class=\"q\">fail (0.9)</span> — raised 1 concern(s): Contains 4 sentences; standard requires under 4 (i.e., at most 3)</div><div class=\"pass\"><span class=\"pn\">pass 4</span> → <span class=\"q\">fail (0.97)</span> — raised 1 concern(s): Contains zero concrete numeric statistics; standard requires at least two (no numbers, percentages, or units appear anywhere)</div>"]]}, {"id": "act", "kind": "gate", "col": 3, "outs": ["result"], "ins": ["when pass", "content", "name"], "gate": true, "detail": [["specialty", "staging an action for a human to approve"], ["tuned", "here, staged mode — never posts to file automatically"], ["this brief", "→ <span class=\"q\">(no run data)</span> — "]]}, {"id": "OUT", "kind": "out", "col": 4, "outs": [], "ins": ["result"], "title": "staged", "w0": 250, "sub": "staged for review", "detail": [["what", "the recipe’s output — staged, never sent automatically"], ["holds", "the staged result"], ["next", "a human reviews and posts it, or edits first — nothing is automatic"]]}];
const WIRES=[["IN", "topic", "write", "topic"], ["IN", "sources", "write", "sources"], ["IN", "brief", "write", "brief"], ["verify", "issues", "write", "feedback", "loop"], ["write", "post", "verify", "draft"], ["IN", "topic", "verify", "topic"], ["write", "post", "act", "content"], ["IN", "slug", "act", "name"], ["verify", "verdict", "write", "when fail", "loop"], ["verify", "verdict", "act", "when pass", "gate"], ["act", "result", "OUT", "result"]];
const WEXP=360, DUR=520;
const detailPx={};   // measured per node after render → exact expanded height, no clipping
// the layout + orthogonal router live in the shared core (engine/graph_core.js); this file is only render + interaction
const G=makeGraphCore(NODES,WIRES,{WEXP,detailPx,axisY:()=>innerHeight/2});
const {sock,wtype,wtopo,WCOL,colOf,computeGeom,route,roundedPath,junctions,juncPoint}=G;
{ const L={split:"split — fans out",merge:"merge — fans in",loop:"loop",gate:"gate"};   // legend: only the types present in this graph
  document.getElementById("wlegend").innerHTML=["split","merge","loop","gate"].filter(t=>wtopo.includes(t))
    .map(t=>{const c=WCOL[t];return `<span class="wi"><span class="ln" style="border-color:${c[0]}${c[2]?';border-top-style:dashed':''}"></span>${L[t]}</span>`;}).join(""); }

const canvas=document.getElementById("canvas"), world=document.getElementById("world"), svg=document.getElementById("wires"), NS="http://www.w3.org/2000/svg";
const el={}, wpath=[];

// build node DOM once
NODES.forEach(n=>{
  const d=document.createElement("div"); d.className="node "+n.kind; d.dataset.id=n.id;
  const kd=(n.kind==="in"||n.kind==="out")?"":`<span class="kd">${n.kind}</span>`;
  let h=`<div class="nhead">${n.title||n.id}${kd}</div>`;
  if(n.sub) h+=`<div class="nsub">${n.sub}</div>`;
  n.outs.forEach(o=>h+=`<div class="row out">${o}<span class="dot" data-s="${n.id}.${o}.out"></span></div>`);
  n.ins.forEach(i=>{ const g=/^when /.test(i); h+=`<div class="row ${g?'gate':'inp'}"><span class="dot" data-s="${n.id}.${i}.in"></span>${g?'▸ '+i:i}</div>`; });
  const DT={in:"What flows in",out:"What comes out",shared:"What this specialist does",domain:"What this specialist does",gate:"What this specialist does"};
  const dtitle=DT[n.kind]?`<div class="dtitle">${DT[n.kind]}</div>`:"";
  h+=`<div class="detail">`+dtitle+(n.detail||[]).map(([k,v])=>`<div class="dr"><span class="dk">${k}</span><span class="dv">${v}</span></div>`).join("")+`</div>`;
  d.innerHTML=h; d.addEventListener("click",ev=>{ ev.stopPropagation();
    const more=ev.target.closest(".rmore"); if(more){ toggleFull(more,n.id); return; } toggle(n.id); });
  d.addEventListener("mouseenter",()=>{ hoverId=n.id; if(!expId&&!animating){ exitWireMode(); refreshFocus(); } }); d.addEventListener("mouseleave",()=>{ hoverId=null; if(!expId&&!animating&&!wireMode) refreshFocus(); });
  world.appendChild(d); el[n.id]=d;
});
canvas.addEventListener("click",()=>{ if(expId){ const p=expId; expId=null; relayout(true,p);} });
const hit=[];
WIRES.forEach((w,i)=>{
  const hp=document.createElementNS(NS,"path"); hp.setAttribute("class","hit"); svg.appendChild(hp); hit.push(hp);
  const p=document.createElementNS(NS,"path"); p.setAttribute("class","w"); p.dataset.src=w[0]; p.dataset.dst=w[2]; p.dataset.gate=(w[4]==="gate"||w[4]==="loop")?"1":""; svg.appendChild(p); wpath.push(p);
  hp.addEventListener("mouseenter",()=>{ if(!expId&&!animating) onWire(i); });
  hp.addEventListener("mouseleave",()=>{ if(!expId&&!animating) offWire(); });
});
const CONN={}; NODES.forEach(n=>CONN[n.id]=new Set()); WIRES.forEach(w=>{ CONN[w[0]].add(w[2]); CONN[w[2]].add(w[0]); });
// fork/join junctions come from the core (split source / merge dest) — here we only build their DOM
const junc=junctions.map(j=>Object.assign({},j));
junc.forEach(j=>{ j.hit=document.createElementNS(NS,"path"); j.hit.setAttribute("class","hit"); svg.appendChild(j.hit);   // hover target over the trunk
  j.p=document.createElementNS(NS,"path"); j.p.setAttribute("class","w"); j.p.setAttribute("stroke",j.col); j.p.setAttribute("stroke-width","2.4"); j.p.setAttribute("fill","none"); j.p.setAttribute("opacity",".7"); svg.appendChild(j.p);
  j.c=document.createElementNS(NS,"circle"); j.c.setAttribute("r","3.4"); j.c.setAttribute("fill",j.col); j.c.setAttribute("pointer-events","none"); svg.appendChild(j.c);
  j.hit.addEventListener("mouseenter",()=>{ if(!expId&&!animating) onFocus(()=>highlightJunc(j)); });
  j.hit.addEventListener("mouseleave",()=>{ if(!expId&&!animating) offWire(); }); });
function drawJunctions(gm){ junc.forEach(j=>{ const p=juncPoint(j,gm);
  const d=`M ${p.x} ${p.y} L ${p.jx} ${p.y}`; j.p.setAttribute("d",d); j.hit.setAttribute("d",d); j.c.setAttribute("cx",p.jx); j.c.setAttribute("cy",p.y); }); }
function litWires(pred, litNodes){
  wpath.forEach((p,i)=>{ const on=pred(i);
    if(!p.dataset.gate) p.setAttribute("stroke", on?"#e3e9f2":"#b7c0cf");
    p.setAttribute("opacity", on?(p.dataset.gate?"1":".95"):".06"); p.setAttribute("stroke-width", on?"2.7":"2.2"); });
  NODES.forEach(n=> el[n.id].style.opacity=litNodes.has(n.id)?"1":".38");
}
function highlight(id){ const s=new Set([id,...CONN[id]]); litWires(i=>wpath[i].dataset.src===id||wpath[i].dataset.dst===id, s); }
function highlightWire(idx){ const w=WIRES[idx]; litWires(i=>i===idx, new Set([w[0],w[2]])); }
function highlightJunc(j){   // a split/merge trunk → light the whole fan (all wires sharing that socket) + their nodes
  const idx=new Set(), nodes=new Set([j.node]);
  WIRES.forEach((w,i)=>{ if(j.io==="out"?(w[0]===j.node&&w[1]===j.sock):(w[2]===j.node&&w[3]===j.sock)){ idx.add(i); nodes.add(j.io==="out"?w[2]:w[0]); } });
  litWires(i=>idx.has(i), nodes); }
function clearHi(){ WIRES.forEach((_,i)=>styleWire(i)); NODES.forEach(n=> el[n.id].style.opacity="1"); }
// wire-hover mode: dwell to enter, then instant on any wire; lingers the SAME dwell after leaving all wires
const DWELL=360;
let wireMode=false, wireDwellT=0, wireClearT=0;
function onFocus(fn){ clearTimeout(wireClearT); clearTimeout(wireDwellT);   // shared dwell for wires AND junction trunks
  if(wireMode) fn(); else wireDwellT=setTimeout(()=>{ wireMode=true; fn(); }, DWELL); }
function onWire(i){ onFocus(()=>highlightWire(i)); }
function offWire(){ clearTimeout(wireDwellT);
  if(wireMode) wireClearT=setTimeout(()=>{ wireMode=false; refreshFocus(); }, DWELL); }
function exitWireMode(){ wireMode=false; clearTimeout(wireDwellT); clearTimeout(wireClearT); }
// measure each card's detail block at expanded width → exact height, no clipping of the richer content
NODES.forEach(n=>{ const d=el[n.id]; d.style.width=WEXP+"px"; detailPx[n.id]=d.querySelector(".detail").offsetHeight+8; d.style.width=""; });
function toggleFull(btn,id){                                     // reveal/hide a long output inline; the card grows & reflows
  const full=btn.parentElement.querySelector(".rfull"); if(!full) return;
  btn.textContent=full.classList.toggle("on")?"hide ▲":"show full ▸";
  detailPx[id]=el[id].querySelector(".detail").offsetHeight+8;   // re-measure with the full text shown/hidden
  relayout(true);                                                // grow/shrink the card, reflow the graph
}
G.computeRouting();   // now that expanded heights are known, pick routes clear across every state
const dotOf={}; canvas.querySelectorAll(".dot").forEach(d=>dotOf[d.dataset.s]=d);

function styleWire(i){ const p=wpath[i], [c,op,dash]=WCOL[wtopo[i]]||WCOL.data;
  p.setAttribute("stroke",c); p.setAttribute("stroke-width","2.2"); p.setAttribute("opacity",op);
  if(dash) p.setAttribute("stroke-dasharray","6 4"); else p.removeAttribute("stroke-dasharray"); }
function fit(g){                                 // center the whole graph in the viewport; scale down only if it can't fit
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  NODES.forEach(n=>{ const b=g[n.id]; if(b.x<minx)minx=b.x; if(b.y<miny)miny=b.y; if(b.x+b.w>maxx)maxx=b.x+b.w; if(b.y+b.h>maxy)maxy=b.y+b.h; });
  const LM=66; miny-=LM; maxy+=LM;               // room for the highway loops above/below
  const gw=maxx-minx, gh=maxy-miny, vw=innerWidth, vh=innerHeight, padX=90, padTop=64, padBot=44;
  const s=Math.min(1,(vw-2*padX)/gw,(vh-padTop-padBot)/gh);
  const tx=(vw-gw*s)/2-minx*s, ty=padTop+((vh-padTop-padBot)-gh*s)/2-miny*s;
  world.style.transform=`translate(${tx}px,${ty}px) scale(${s})`;
}
function drawAll(g){ WIRES.forEach((_,i)=>{ const d=roundedPath(route(i,g)); wpath[i].setAttribute("d",d); hit[i].setAttribute("d",d); }); drawJunctions(g); fit(g); }
function applyGeom(g){ NODES.forEach(n=>{ const d=el[n.id],t=g[n.id]; d.style.left=t.x+"px";d.style.top=t.y+"px";d.style.width=t.w+"px";d.style.height=t.h+"px"; }); }
function ease(t){ return t<.5? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
function lerpGeom(a,b,e){ const g={}; NODES.forEach(n=>{ const p=a[n.id]||b[n.id], q=b[n.id];
  g[n.id]={x:p.x+(q.x-p.x)*e,y:p.y+(q.y-p.y)*e,w:p.w+(q.w-p.w)*e,h:p.h+(q.h-p.h)*e}; }); return g; }

let expId=null, hoverId=null, animating=false, anim=0, curGeom=null;
function refreshFocus(){ const f=expId||hoverId; if(f) highlight(f); else clearHi(); }
function relayout(animate, prevExp){
  const endGeom=computeGeom(expId);
  NODES.forEach(n=> el[n.id].classList.toggle("exp",n.id===expId));
  WIRES.forEach((_,i)=>styleWire(i));
  const hold=expId||prevExp; if(hold) highlight(hold); else refreshFocus();   // keep it lit through the whole animation
  if(!animate || !curGeom){ applyGeom(endGeom); drawAll(endGeom); curGeom=endGeom; if(!expId) refreshFocus(); return; }
  const startGeom=curGeom; cancelAnimationFrame(anim); animating=true; const t0=performance.now();
  const step=now=>{ let t=(now-t0)/DUR; if(t>1)t=1; const g=lerpGeom(startGeom,endGeom,ease(t));
    applyGeom(g); drawAll(g);
    if(t<1) anim=requestAnimationFrame(step); else { curGeom=endGeom; animating=false; if(!expId) refreshFocus(); } };  // held for the FULL animation; only now re-evaluate hover → clears iff done AND not hovering
  anim=requestAnimationFrame(step);
}
function toggle(id){ const prev=expId; expId=(expId===id?null:id); relayout(true, prev); }
addEventListener("resize",()=>{ if(!anim){ curGeom=computeGeom(expId); applyGeom(curGeom); drawAll(curGeom); } });

relayout(false);
{ const p=new URLSearchParams(location.search); const q=p.get("exp"); if(q){ expId=q; relayout(true); } const h=p.get("hl"); if(h) highlight(h); }
</script>
